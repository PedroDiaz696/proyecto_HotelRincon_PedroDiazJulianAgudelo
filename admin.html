<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Panel de Administración</title>

    <script src="./js/storage.js" defer></script>
    <script src="js/admin.js" defer></script>

    <link rel="stylesheet" href="./css/admin.css">

</head>

<body>

    <div class="admin-container">

        <!-- ========================================= -->
        <!-- SIDEBAR -->
        <!-- ========================================= -->

        <aside class="sidebar">

            <div class="sidebar-logo">

                <h2>Hotel Rincón</h2>

                <p>Panel Admin</p>

            </div>

            <nav>

                <ul>

                    <li>Dashboard</li>

                    <li>Habitaciones</li>

                    <li>Reservas</li>

                    <li id="cerrarSesion">
                        Cerrar sesión
                    </li>

                </ul>

            </nav>

        </aside>

        <!-- ========================================= -->
        <!-- CONTENIDO PRINCIPAL -->
        <!-- ========================================= -->

        <main class="main-content">

            <!-- TOPBAR -->

            <header class="topbar">

                <div>

                    <h1>Administración de Habitaciones</h1>

                    <p>
                        Aquí puedes gestionar la información
                        de las habitaciones del hotel.
                    </p>

                </div>

            </header>

            <!-- ========================================= -->
            <!-- FORMULARIO EDITAR -->
            <!-- ========================================= -->

            <section class="form-section">

                <h2>Editar Habitación</h2>

                <form id="formHabitacion">

                    <!-- NOMBRE -->

                    <input
                        type="text"
                        id="nombre"
                        placeholder="Nombre habitación"
                        required
                    >

                    <!-- CAMAS -->

                    <input
                        type="number"
                        id="camas"
                        placeholder="Cantidad camas"
                        required
                    >

                    <!-- PERSONAS -->

                    <input
                        type="number"
                        id="personas"
                        placeholder="Máximo personas"
                        required
                    >

                    <!-- PRECIO -->

                    <input
                        type="number"
                        id="precio"
                        placeholder="Precio por noche"
                        required
                    >

                    <!-- SERVICIOS -->

                    <div class="checkbox-group">

                        <label>

                            <input
                                type="checkbox"
                                id="internet"
                            >

                            Internet

                        </label>

                        <label>

                            <input
                                type="checkbox"
                                id="minibar"
                            >

                            Minibar

                        </label>

                        <label>

                            <input
                                type="checkbox"
                                id="jacuzzi"
                            >

                            Jacuzzi

                        </label>

                    </div>

                    <!-- BOTÓN -->

                    <button type="submit">

                        Guardar Cambios

                    </button>

                </form>

            </section>

            <!-- ========================================= -->
            <!-- TABLA HABITACIONES -->
            <!-- ========================================= -->

            <section class="table-section">

                <h2>Habitaciones del Hotel</h2>

                <table>

                    <!-- ENCABEZADOS -->

                    <thead>

                        <tr>

                            <th>Habitación</th>

                            <th>Camas</th>

                            <th>Personas</th>

                            <th>Precio</th>

                            <th>Servicios</th>

                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <!-- CONTENIDO DINÁMICO -->

                    <tbody id="tablaHabitaciones">

                        <!--
                            AQUÍ JAVASCRIPT INSERTA
                            LAS HABITACIONES
                            DINÁMICAMENTE
                        -->

                    </tbody>

                </table>

            </section>

        </main>

    </div>

    <!-- ========================================= -->
    <!-- SCRIPTS -->
    <!-- ========================================= -->

    <!-- STORAGE -->

    <script src="./js/storage.js"></script>

    <!-- ADMIN -->

    <script src="./js/admin.js"></script>

</body>

</html>
